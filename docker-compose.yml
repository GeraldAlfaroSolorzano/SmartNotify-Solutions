services:
  mysql:
    image: mysql:8.0
    container_name: smartnotify_mysql_repo
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartnotify
    ports:
      - "3308:3306"
    volumes:
      - smartnotify_mysql_repo_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  smartnotify_mysql_repo_data: